version: "3"

tasks:
  init:
    desc: Initialize the Go module
    cmds:
    - |

      go mod init github.com/go-composites/date

  requirements:
    desc: Add module requirements and sums
    cmds:
    - |

      export GOPRIVATE=github.com/go-composites GOPROXY=direct GOSUMDB=off GOFLAGS=-mod=mod
      go get github.com/go-composites/result@main
      go get github.com/go-composites/error@main
      go get github.com/go-composites/null@main
      go mod tidy
